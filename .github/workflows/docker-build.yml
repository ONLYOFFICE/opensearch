name: Build and push multi-arch Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'OpenSearch base image version (e.g. 3.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: tag
        run: |
          docker_tag="${{ github.event.inputs.docker_tag || github.ref_name }}"
          echo "docker_tag=${docker_tag#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DOCKER_TAG=${{ steps.tag.outputs.docker_tag }}
          tags: onlyoffice/opensearch:${{ steps.tag.outputs.docker_tag }}
